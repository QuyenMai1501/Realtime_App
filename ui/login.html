<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <form class="card" id="loginForm">
        <h1>Đăng nhập</h1>
        <p class="sub">Nhập email và mật khẩu để tiếp tục</p>

        <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="you@example.com" required />
        </div>

        <div class="field">
            <label for="password">Mật khẩu</label>
            <input id="password" type="password" placeholder="••••••••" required />
        </div>

        <button id="submitBtn" type="submit">Đăng nhập</button>
        <div id="msg" class="msg"></div>
        <div class="hint">Token sẽ được lưu vào localStorage với key: <b>"token"</b></div>
    </form>

    <script>
        const form = document.getElementById("loginForm");
        const emailEl = document.getElementById("email");
        const passwordEl = document.getElementById("password");
        const msgEl = document.getElementById("msg");
        const submitBtn = document.getElementById("submitBtn");

        function setMsg(text, type = "") {
            msgEl.className = "msg" + (type ? " " + type : "");
            msgEl.textContent = text;
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            setMsg("");

            const email = emailEl.value.trim();
            const password = passwordEl.value;

            if (!email || !password) {
                setMsg("Vui lòng nhập đầy đủ email và mật khẩu", "error");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = "Đang đăng nhập...";

            try {
                const res = await fetch("https://localhost:9999/api/login", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({email, password})
                });

                const data = await res.json();

                if (!res.ok) {
                    setMsg(data.message || "Đăng nhập thất bại", "error");
                    return;
                }

                localStorage.setItem("token", data.token);
                setMsg("Đăng nhập thành công!", "ok");

                setTimeout(() => {
                    window.location.href = "/ui/myProfile.html";
                }, 600);
            } catch (err) {
                setMsg("Không thể kết nối đến server. " + err.message, "error");
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "Đăng nhập";
            }
        });
    </script>
</body>
</html>
